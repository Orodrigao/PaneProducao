name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verificacao:
    name: Verificação (lint, tipos, testes, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preparar ambiente local seguro
        run: cp .env.example .env.local

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      # tsc e build nunca em paralelo: disputam .next/types (ver lessons.md)
      - name: Tipos
        run: npx tsc --noEmit

      - name: Testes
        run: npm test

      - name: Build
        run: npm run build
